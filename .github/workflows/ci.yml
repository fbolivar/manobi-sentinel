name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install --no-audit --no-fund
      - run: npm test -- --ci --passWithNoTests

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api
        uses: docker/build-push-action@v5
        with: { context: ./backend, push: false, tags: manobi-api:ci, cache-from: type=gha, cache-to: type=gha,mode=max }
      - name: Build frontend
        uses: docker/build-push-action@v5
        with: { context: ./frontend, push: false, tags: manobi-frontend:ci, cache-from: type=gha, cache-to: type=gha,mode=max }
      - name: Build ai-service
        uses: docker/build-push-action@v5
        with: { context: ./ai-service, push: false, tags: manobi-ai:ci, cache-from: type=gha, cache-to: type=gha,mode=max }
