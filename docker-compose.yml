# ================================================================
# Manobi Sentinel — Orquestación on-premise (Debian 12 + Docker 24+)
# ================================================================
name: manobi-sentinel

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: false
  monitoring-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOST_DATA_POSTGRES}
  redis-data:
  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOST_DATA_MINIO}
  geoserver-data:
  tileserver-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOST_DATA_TILES}
  prometheus-data:
  grafana-data:
  loki-data:

services:

  # ---------- Reverse Proxy ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: manobi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - api
      - geoserver
      - pg_tileserv
      - pg_featureserv
      - tileserver-gl
      - minio
    networks: [frontend-net, backend-net]
    logging: *default-logging

  # ---------- Frontend ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_URL}/api
        VITE_WS_URL: ${PUBLIC_URL}
        VITE_TILES_URL: ${PUBLIC_URL}/tiles
        VITE_GEOSERVER_URL: ${PUBLIC_URL}/geoserver
    container_name: manobi-frontend
    restart: unless-stopped
    networks: [frontend-net]
    logging: *default-logging

  # ---------- API NestJS ----------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manobi-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${API_PORT}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      minio:    { condition: service_started }
    networks: [backend-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---------- AI Service (FastAPI) ----------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: manobi-ai
    restart: unless-stopped
    env_file: .env
    networks: [backend-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---------- PostgreSQL + PostGIS ----------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: manobi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks: [backend-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    shm_size: 256mb
    logging: *default-logging

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: manobi-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks: [backend-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ---------- MinIO ----------
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: manobi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks: [backend-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # ---------- GeoServer ----------
  geoserver:
    image: docker.osgeo.org/geoserver:2.25.2
    container_name: manobi-geoserver
    restart: unless-stopped
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD}
      INSTALL_EXTENSIONS: "true"
      STABLE_EXTENSIONS: "wps,csw,monitor"
    volumes:
      - geoserver-data:/opt/geoserver_data
    networks: [backend-net]
    logging: *default-logging

  # ---------- pg_tileserv ----------
  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: manobi-pg-tileserv
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres: { condition: service_healthy }
    networks: [backend-net]
    logging: *default-logging

  # ---------- pg_featureserv ----------
  pg_featureserv:
    image: pramsey/pg_featureserv:latest
    container_name: manobi-pg-featureserv
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres: { condition: service_healthy }
    networks: [backend-net]
    logging: *default-logging

  # ---------- TileServer GL (tiles base on-premise) ----------
  tileserver-gl:
    image: maptiler/tileserver-gl:latest
    container_name: manobi-tileserver
    restart: unless-stopped
    command: ["--config", "/data/config.json", "--public_url", "${PUBLIC_URL}/tiles/"]
    volumes:
      - ./tileserver-gl/config.json:/data/config.json:ro
      - tileserver-data:/data/mbtiles
    networks: [backend-net]
    logging: *default-logging

  # ---------- Postfix (SMTP) ----------
  postfix:
    image: boky/postfix:latest
    container_name: manobi-postfix
    restart: unless-stopped
    environment:
      ALLOWED_SENDER_DOMAINS: "parques.gov.co"
      RELAYHOST: ${SMTP_RELAY_HOST}
      RELAYHOST_USERNAME: ${SMTP_RELAY_USER}
      RELAYHOST_PASSWORD: ${SMTP_RELAY_PASSWORD}
      SMTP_PORT: "587"
    networks: [backend-net]
    logging: *default-logging

  # ---------- Prometheus ----------
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: manobi-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION}
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [backend-net, monitoring-net]
    logging: *default-logging

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana:11.3.1
    container_name: manobi-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${PUBLIC_URL}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: postfix:25
      GF_SMTP_FROM_ADDRESS: alertas@parques.gov.co
      GF_SMTP_FROM_NAME: Manobi Sentinel
      GF_SMTP_SKIP_VERIFY: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [backend-net, monitoring-net]
    logging: *default-logging

  # ---------- Loki ----------
  loki:
    image: grafana/loki:3.2.1
    container_name: manobi-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks: [monitoring-net]
    logging: *default-logging

  # ---------- Promtail ----------
  promtail:
    image: grafana/promtail:3.2.1
    container_name: manobi-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [monitoring-net]
    logging: *default-logging

  # ---------- Exporters ----------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: manobi-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [backend-net, monitoring-net]
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: manobi-redis-exporter
    restart: unless-stopped
    command:
      - --redis.addr=redis://redis:6379
      - --redis.password=${REDIS_PASSWORD}
    depends_on:
      redis: { condition: service_healthy }
    networks: [backend-net, monitoring-net]
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: manobi-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks: [monitoring-net]
    logging: *default-logging
