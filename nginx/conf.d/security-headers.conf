# ---------------------------------------------------------------------------
# Cabeceras de seguridad (incluidas en cada respuesta del server HTTPS)
# Referencias: MDN Security Headers, OWASP Secure Headers Project.
# ---------------------------------------------------------------------------

# HSTS: fuerza HTTPS para este dominio durante 1 año, incluyendo subdominios.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Anti-clickjacking: solo el propio sitio puede embeber la app en un <iframe>.
add_header X-Frame-Options "SAMEORIGIN" always;

# Evita que el navegador intente inferir el MIME type (mitiga XSS por sniffing).
add_header X-Content-Type-Options "nosniff" always;

# El navegador sólo envía el Referer completo en requests same-origin.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Desactiva APIs sensibles del navegador que la app no usa.
add_header Permissions-Policy
  "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(self), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(self), screen-wake-lock=(), sync-xhr=(self), usb=(), web-share=(), xr-spatial-tracking=()"
  always;

# CSP estricta:
#   - default-src 'self'    — cualquier recurso no listado explicitamente solo desde el origen.
#   - script-src 'self' 'unsafe-inline' — Vite/React build no requiere unsafe-inline, pero tiles
#     y algunos componentes pueden generar inline; se mantiene por compatibilidad.
#   - style-src 'self' 'unsafe-inline' — Tailwind + inline styles dinamicos (ej. ancho de barras).
#   - connect-src 'self' wss: — API + WebSocket. Se quita el 'https:' generico para evitar
#     filtracion de datos a dominios externos.
#   - img-src 'self' data: blob: — tiles (proxeados por nginx desde /tiles/osm/, same-origin),
#     imagenes base64 y blobs de descarga. No se permite ningun dominio externo directo.
#   - font-src 'self' data: fonts.googleapis.com fonts.gstatic.com — Google Fonts (por @import
#     en index.css segun decision del usuario, ver memoria frontend_gotchas).
#   - worker-src 'self' blob:   — service worker + OpenLayers workers.
#   - frame-ancestors 'self'    — equivalente a X-Frame-Options SAMEORIGIN.
#   - form-action 'self'        — forms solo pueden postear al mismo origen.
#   - base-uri 'self'           — evita inyeccion de <base> para secuestrar URLs relativas.
#   - object-src 'none'         — bloquea <object>/<embed>/<applet>, vector clasico de XSS.
add_header Content-Security-Policy
  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self' wss:; worker-src 'self' blob:; frame-ancestors 'self'; form-action 'self'; base-uri 'self'; object-src 'none';"
  always;

# Nota: X-XSS-Protection se elimino intencionalmente. Todos los navegadores modernos lo
# ignoran o desaconsejan (MDN); depender de el puede introducir bugs. La CSP es la defensa
# real contra XSS.
