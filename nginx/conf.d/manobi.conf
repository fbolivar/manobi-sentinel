# ---- HTTP -> HTTPS ----
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---- HTTPS principal ----
#
# Nota sobre proxy_pass con variables:
# - Se usan `set $upstream_<svc> "host:port"` + `proxy_pass http://$upstream_<svc>...` para
#   forzar a nginx a re-resolver el nombre contra el resolver Docker (127.0.0.11, ver nginx.conf)
#   en cada request (TTL 10s). Asi, si un contenedor se recrea y cambia de IP, nginx no queda
#   atascado con la IP vieja (problema clasico "502 Bad Gateway" tras `docker compose up`).
# - Con variables, nginx NO reescribe la URI automaticamente segun el trailing slash del
#   proxy_pass (comportamiento literal del path si se especifica). Por eso usamos
#   `rewrite ... break;` donde hace falta strip de prefijo.
# - Trade-off: se pierde el keepalive a upstream. Para trafico interno de esta app es
#   imperceptible, y la resiliencia operativa compensa.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/manobi.crt;
    ssl_certificate_key /etc/nginx/ssl/manobi.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    include /etc/nginx/conf.d/security-headers.conf;

    # ---- Frontend (React SPA) ----
    location / {
        set $upstream_frontend "frontend:80";
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- API NestJS ----
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        set $upstream_api "api:3000";
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$upstream_api$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Login endpoint con rate limit estricto ----
    location = /api/auth/login {
        limit_req zone=auth_login burst=3 nodelay;
        set $upstream_api "api:3000";
        proxy_pass http://$upstream_api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Verificacion OTP (segundo factor) con rate limit ----
    location = /api/auth/verify-otp {
        limit_req zone=auth_otp burst=5 nodelay;
        set $upstream_api "api:3000";
        proxy_pass http://$upstream_api/auth/verify-otp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Reenvio de codigo OTP con rate limit mas estricto ----
    location = /api/auth/resend-otp {
        limit_req zone=auth_resend burst=2 nodelay;
        set $upstream_api "api:3000";
        proxy_pass http://$upstream_api/auth/resend-otp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Refresh token con rate limit moderado ----
    location = /api/auth/refresh {
        limit_req zone=auth_refresh burst=10 nodelay;
        set $upstream_api "api:3000";
        proxy_pass http://$upstream_api/auth/refresh;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- WebSocket (Socket.io) ----
    location /socket.io/ {
        set $upstream_api "api:3000";
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ---- GeoServer (WMS/WFS) ----
    # La URI original /geoserver/... se preserva tal cual hacia el backend.
    location /geoserver/ {
        set $upstream_geoserver "geoserver:8080";
        proxy_pass http://$upstream_geoserver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- pg_tileserv (MVT) ----
    location /tileserv/ {
        set $upstream_tileserv "pg_tileserv:7800";
        rewrite ^/tileserv/(.*)$ /$1 break;
        proxy_pass http://$upstream_tileserv$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- pg_featureserv (GeoJSON) ----
    location /featureserv/ {
        set $upstream_featureserv "pg_featureserv:9000";
        rewrite ^/featureserv/(.*)$ /$1 break;
        proxy_pass http://$upstream_featureserv$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Proxy-cache de tiles OSM (para evitar dependencia directa del navegador) ----
    # El frontend pide /tiles/osm/{z}/{x}/{y}.png; nginx lo proxea a tile.openstreetmap.org
    # y lo cachea localmente (zona osm_cache, 2 GB, 30 dias). Asi el navegador habla solo con
    # el mismo origen (CSP estricta img-src 'self'), y el servidor solo consulta OSM cuando
    # un tile no esta en cache. Cumple con la politica de uso de OSM:
    # https://operations.osmfoundation.org/policies/tiles/ (UA identificador, cache agresivo).
    location ~ ^/tiles/osm/(?<osm_z>\d+)/(?<osm_x>\d+)/(?<osm_y>\d+)\.png$ {
        set $osm_upstream "tile.openstreetmap.org";
        proxy_pass https://$osm_upstream/$osm_z/$osm_x/$osm_y.png;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name tile.openstreetmap.org;
        proxy_set_header Host tile.openstreetmap.org;
        proxy_set_header User-Agent "ManobiSentinel/0.4 (PNN Colombia on-premise proxy; contact fbolivarb@gmail.com)";
        proxy_set_header Accept "image/png,image/*;q=0.8,*/*;q=0.5";

        # Cache
        proxy_cache osm_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1h;
        proxy_cache_valid any 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_revalidate on;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- TileServer GL (tiles base) ----
    location /tiles/ {
        set $upstream_tilesgl "tileserver-gl:8080";
        rewrite ^/tiles/(.*)$ /$1 break;
        proxy_pass http://$upstream_tilesgl$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Grafana (bajo /grafana) ----
    # Grafana espera el prefijo /grafana/ intacto (GF_SERVER_SERVE_FROM_SUB_PATH=true).
    location /grafana/ {
        # Grafana necesita unsafe-eval para plugins (PostgreSQL, etc)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; worker-src 'self' blob:; frame-ancestors 'self';";
        set $upstream_grafana "grafana:3000";
        proxy_pass http://$upstream_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana live (WebSocket) — path literal hacia /api/live/
    location /grafana/api/live/ {
        set $upstream_grafana "grafana:3000";
        proxy_pass http://$upstream_grafana/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ---- MinIO (descarga firmada de reportes) ----
    location /minio/ {
        set $upstream_minio "minio:9000";
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://$upstream_minio$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        client_max_body_size 1000m;
    }
}
