user  nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs con formato JSON para Loki
    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent"'
      '}';
    access_log  /var/log/nginx/access.log  json_combined;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/vnd.mapbox-vector-tile;

    # Zonas de rate limiting (por IP)
    limit_req_zone $binary_remote_addr zone=api_general:10m  rate=100r/m; # API general
    limit_req_zone $binary_remote_addr zone=auth_login:10m   rate=5r/m;   # Login brute-force
    limit_req_zone $binary_remote_addr zone=auth_otp:10m     rate=10r/m;  # Verificacion OTP
    limit_req_zone $binary_remote_addr zone=auth_resend:10m  rate=3r/m;   # Reenvio codigo OTP
    limit_req_zone $binary_remote_addr zone=auth_refresh:10m rate=20r/m;  # Refresh token

    # Resolver DNS de Docker (127.0.0.11) — re-resuelve nombres de servicios cada 10s.
    # Combinado con variables en proxy_pass (ver manobi.conf), nginx refresca la IP del upstream
    # automaticamente cuando un contenedor se recrea, evitando 502 por IP stale.
    # Docker DNS (127.0.0.11) forwardea consultas externas al resolver del host, asi que
    # tambien sirve para resolver nombres publicos como tile.openstreetmap.org.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Cache de tiles OSM proxied. Los tiles rara vez cambian, asi que cache agresiva.
    # 2GB max_size alcanza para todo Colombia a zoom razonable. 30d inactive mantiene
    # entradas populares; las demas se evict por LRU.
    proxy_cache_path /var/cache/nginx/osm levels=1:2 keys_zone=osm_cache:50m
                     max_size=2g inactive=30d use_temp_path=off;

    include /etc/nginx/conf.d/*.conf;
}
