user  nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs con formato JSON para Loki
    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent"'
      '}';
    access_log  /var/log/nginx/access.log  json_combined;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/vnd.mapbox-vector-tile;

    # Zonas de rate limiting
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_login:10m  rate=5r/m;

    # Upstreams
    upstream api_backend       { server api:3000;          keepalive 32; }
    upstream frontend_backend  { server frontend:80;       keepalive 32; }
    upstream geoserver_backend { server geoserver:8080;    keepalive 16; }
    upstream tileserv_backend  { server pg_tileserv:7800;  keepalive 16; }
    upstream featureserv_backend { server pg_featureserv:9000; keepalive 16; }
    upstream tileservergl_backend  { server tileserver-gl:8080; keepalive 16; }
    upstream grafana_backend   { server grafana:3000;      keepalive 16; }
    upstream minio_backend     { server minio:9000;        keepalive 16; }

    include /etc/nginx/conf.d/*.conf;
}
